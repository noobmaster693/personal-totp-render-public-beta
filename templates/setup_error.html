<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal setup required</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="centered-page">
  <main class="error-card">
    <div class="brand-mark" aria-hidden="true">!</div>
    <h1>Render setup is incomplete</h1>
    <p>Add the missing values under your Render service’s Environment page, then save and redeploy.</p>
    <ul class="error-list">
      {% for error in errors %}
        <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </main>
</body>
</html>
