services:
  - type: web
    name: personal-totp-public-beta
    runtime: python
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 60 app:app
    healthCheckPath: /health
    envVars:
      - key: TOTP_SECRET
        sync: false
      - key: TOTP_LABEL
        value: ChatGPT Test Account
      - key: TOTP_ISSUER
        value: OpenAI
